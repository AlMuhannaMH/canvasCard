<!doctype html>        
<html lang="en">        
        
<head>        
    <meta charset="UTF-8">        
    <meta http-equiv="X-UA-Compatible" content="IE=edge">        
    <meta name="viewport" content="width=device-width, initial-scale=1.0, shrink-to-fit=no">        
    <title>Create your Eid AlFitr Greeting</title>        
    <link href='https://fonts.cdnfonts.com/css/tajawal' rel='stylesheet' type='text/css'>        
    <!-- Include Bootstrap CSS locally -->        
    <link rel="stylesheet" href="css/bootstrap.min.css">        
    <!-- Include custom styles -->        
    <link rel="stylesheet" href="css/style.css">        
</head>        
        
<body>        
    <header>        
        <div class="container text-center">        
            <img class="img-fluid mb-3" src="images/logo.png" alt="Logo">        
            <h2 class="heading-section" data-lang="en">Create your Eid AlFitr Greeting</h2>        
            <h2 class="heading-section" lang="ar" data-lang="ar">انشاء بطاقة تهنئة عيد الفطر</h2>        
        </div>        
    </header>        
    <section class="ftco-section">        
        <div class="container text-center">        
            <div class="language-selection mb-4">        
                <span data-lang="en">Language:</span>        
                <span lang="ar" data-lang="ar">اللغة:</span>        
                <select title="Change Language" id="change-language" class="form-select">        
                    <option value="en">English</option>        
                    <option value="ar">العربية</option>        
                </select>        
            </div>        
            <div class="wrapper text-center">        
                <div class="contact-wrap text-center">        
                    <h3 data-lang="en">Share your Eid AlFitr Greeting</h3>        
                    <h3 lang="ar" data-lang="ar">شارك تهنئة عيد الفطر</h3>        
                    <form method="POST" id="contactForm" name="contactForm" class="contactForm">        
                        <div class="form-group text-center">        
                            <label for="name" data-lang="en">Enter your name</label>        
                            <label for="name" lang="ar" data-lang="ar">أكتب اسمك</label>        
                            <input type="text" class="form-control" name="name" id="name" placeholder="Your Name">        
                        </div>        
                        <div class="form-group text-center">        
                            <input id="preview" type="button" value="Create" onclick="validateInput()" class="btn btn-primary">        
                            <a class="btn btn-primary" id="download" download="EidAlFitrGreeting.png" href="" onclick="return download_img(this);">Download Image</a>        
                        </div>        
                    </form>        
                </div>        
                <div class="row justify-content-center text-center">        
                    <div class="col-md-6">        
                        <img class="img-fluid w-100" src="images/EidAlFitrGreeting.jpg" alt="Eid AlFitr Greeting">        
                    </div>        
                    <div class="col-md-6">        
                        <canvas class="w-100" id="demo"></canvas>        
                    </div>        
                </div>        
            </div>        
        </div>        
    </section>        
    <footer class="text-center">        
        <p>&copy; 2025 Mohammed AlMuhanna</p>        
    </footer>        
        
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>        
    <script src="js/bootstrap.bundle.min.js"></script>        
    <script src="js/jquery.validate.min.js"></script>        
    <script src="js/scrpit.js"></script>        
    <script src="https://cdn.jsdelivr.net/npm/i18n-language@1.0.8/i18n-language.min.js"></script>        
</body>        
        
</html>
